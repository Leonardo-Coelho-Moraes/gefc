{%extends 'base.html'%}
{% block conteudo %}


<div class="content-wrapper">
  <!-- Content Header (Page header) -->
  <section class="content-header">

    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Abastercer</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="{{url('index')}}">Inicio</a></li>
            <li class="breadcrumb-item active">Abastercer</li>
          </ol>
        </div>
      </div>
    </div><!-- /.container-fluid -->
  </section>

  {{flash()}}

  <section class="content">
    <div class="container-fluid">
      <div class="row">
        <div class="col-12">
          <!-- Default box -->
          <div class="card">
            <div class="card-header bg-primary">
              <h3 class="card-title">Adicionar Produto ao Estoque</h3>

            </div>
            <div class="card-body" >
              <div id="data-container" data-lotes='{{ lotesarray }}'>
              </div>
             <form id="sourceForm" >
               <div class="form-group">
                 <label>COD Produto:</label>
                 <input type="text" id="cod_barras" name='cod_barras' class="form-control" autofocus>
               </div>
               <div class="form-group">
                 <label>Produtos:</label>
                 <select id="selectField" class="campo_select form-control" style="width: 100%" name="selectField"
                   >
                   
                   
                  
                 </select>
               </div>
               <div class="form-group">
                 <label>Qnt Solicitada:</label>
                 <input type="number" id="qntSolic" name="qntSolic" min="1" class="form-control" >
               </div>
               <div class="form-group">
                 <label>Qnt:</label>
                 <input type="number" id="numberField" name="numberField" min="1" class="form-control" >
               </div>
               <div class="form-group justify-content-between d-flex">
               
                 <button type="button" class="btn btn-primary" id="submitButton" >Enviar</button>
                  <button type="button" class="btn btn-danger" id="limparLista">Limpar Lista</button>
               </div>
             </form>


              <p class="text-body" id='teste'>Lista:</p>
              <hr>

              <form action="{{ url('abastecer') }}" method="post">
                <div id="targetForm" class="d-flex flex-column w-100 text-body"></div>
                <div class="d-flex w-100 gap-3 align-items-center">
                  <div class="form-group">
                    <label for="local">Local</label>
                    <select id="local" class="form-control" name="local">
                      {% for local in locais %}
                      <option value="{{ local.id }}">{{ local.nome }}</option>
                      {% endfor %}
                    </select>
                  </div>
                  <div class="form-group">
                    <input class="form-control btn btn-primary" id="venderBtn" type="submit" value="Adicionar Saída">
                  </div>
                </div>
              </form>
            </div>
            <!-- /.card-body -->

            <!-- /.card-footer-->
          </div>
          <!-- /.card -->
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="row">
        <div class="col-12">
          <!-- Default box -->
          <div class="card ">
            <div class="card-header bg-primary">
              <h3 class="card-title">Cadastrar Lote e Adicionar ao Local</h3>

              <div class="card-tools">
                <button type="button" class="btn btn-tool" data-card-widget="collapse" title="Collapse">
                  <i class="fas fa-plus"></i>
                </button>

              </div>
            </div>
            <div class="card-body">
              <!-- /.conteudo-->
              <form action="{{ url('abastecer') }}" method="post">
                <input type="hidden" name="loteAdd" id="loteAdd">
                <div class="form-group">
                  <label>Produto</label>
                  <select id="produto" class="campo_select form-control" style="width: 100%" name="produto" autofocus>
                    {% for produto in produtos %}
                    <option value="{{ produto.id }},{{ produto.nome }}">{{ produto.nome }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="form-group row">

                  <div class="col">
                    <label>Lote</label>
                    <input class="form-control" id="lote" type="text" name="lote" placeholder="Ex: 1234567890" required>
                  </div>
                  <div class="col">
                    <label>Fornecedor</label>

                    <select name="fornecedor" id="fornecedor" class="form-control" required>
                      <option value="Estorno UBS Fluvial">Estorno UBS Fluvial</option>

                      <option value="Fornecedor">Fornecedor</option>
                      <option value="CEMA">CEMA</option>

                    </select>
                  </div>

                </div>
                <div class="row form-group">
                  <div class="col">
                    <label>Vencimento</label>
                    <input class="form-control" id="vencimento" type="date" name="vencimento" placeholder="Ex: Dipirona"
                      required>
                  </div>
                  <div class="col">
                    <label>Quantidade</label>
                    <input class="form-control" id="quantidade" type="number" name="quantidade" min='0' required>
                  </div>

                  <div class="col d-none">
                    <label>Preço</label>
                    <input class="form-control" value="1" id="preco" type="number" step="0.01" min="0.1" name="preco"
                      placeholder="32,55" required>
                  </div>
                  <div class="col d-none">
                    <label>Preço Comercial</label>
                    <input class="form-control" value="1" id="preco_comercial" type="number" step="0.01" min="0.1"
                      name="preco_comercial" placeholder="32,55" required>
                  </div>


                </div>
                <div class="row form-group d-none ">
                  <div class="col">

                    <label>Localização</label>
                    <input class="form-control" id="localizacao" type="text" name="localizacao" value="n"
                      placeholder="Ex: Palet g12" >
                  </div>
                 
                </div>
<div class="form-group">
  <label for="localL">Local</label>
  <select id="localL" class="form-control" name="localL">
    {% for local in locais %}
    <option value="{{ local.id }}">{{ local.nome }}</option>
    {% endfor %}
  </select>
</div>
                <div class="form-group">
                  <input class="btn btn-primary form-control" type="submit" value="Cadastrar">
                </div>
              </form>
            </div>
            <!-- /.card-body -->

            <!-- /.card-footer-->
          </div>
          <!-- /.card -->
        </div>
      </div>
    </div>
  </section>
</div>







{% endblock %}
{% block script %} <script src="{{url('templates/assets/js/venda.js')}}"></script> {% endblock %}
